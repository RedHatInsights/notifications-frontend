apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/notifications-frontend?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://github.com/RedHatInsights/konflux-pipelines/raw/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: notifications-frontend
    appstudio.openshift.io/component: notifications-frontend
    pipelines.appstudio.openshift.io/type: build
  name: notifications-frontend-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/notifications-frontend/notifications-frontend:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile

  # Workspace setup - install dependencies BEFORE tests run
  - name: workspace-setup-script
    value: |
      #!/bin/bash
      set -ex
      # Install npm dependencies (including Playwright)
      npm ci
      # Note: Playwright browsers are pre-installed in the playwright image
      # when image version matches package.json

  # Unit tests - verified command from package.json
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex
      npm run lint
      npm run test

  # E2E tests - only run tests (dependencies installed in workspace-setup-script)
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex
      npx playwright test

  # Run app script - start Caddy to serve app assets
  - name: run-app-script
    value: |
      #!/bin/bash
      set -ex
      # Start Caddy to serve app assets
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  # E2E configuration
  - name: e2e-playwright-image
    value: "mcr.microsoft.com/playwright:v1.58.2-jammy"

  - name: frontend-proxy-routes-configmap
    value: "notifications-frontend-dev-proxy-caddyfile"

  - name: e2e-credentials-secret
    value: "notifications-frontend-credentials-secret"

  - name: e2e-app-port
    value: "8000"

  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/RedHatInsights/konflux-pipelines
      - name: revision
        value: main
      - name: pathInRepo
        value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-notifications-frontend
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
